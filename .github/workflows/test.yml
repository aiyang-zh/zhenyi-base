name: Run Tests

on:
  push:
    branches: [ "main" ]        # 推送到 main 时触发
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]        # 向 main 提 PR 时触发
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'     # 最小支持版本，与 go.mod 一致

      - name: Run tests
        run: make test

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()              # 即使失败也上传结果
        with:
          name: test-results-${{ github.sha }}
          path: test_results/

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run fuzz tests
        env:
          FUZZTIME: 5s
        run: bash ./scripts/run_fuzz_all.sh

      - name: Upload failing inputs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: zhenyi-base-failing-inputs
          path: |
            **/testdata/fuzz/**
          if-no-files-found: ignore
